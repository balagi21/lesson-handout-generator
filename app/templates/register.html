{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-6">
    <h1 class="text-2xl font-bold text-center mb-6">Регистрация</h1>
    
    <form method="post" action="/auth/register">
        <div class="mb-4">
            <label for="username" class="block text-gray-700 mb-2">Имя пользователя</label>
            <input type="text" 
                   name="username" 
                   id="username" 
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="email" class="block text-gray-700 mb-2">Email</label>
            <input type="email" 
                   name="email" 
                   id="email" 
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <div class="mb-4">
            <label for="password" class="block text-gray-700 mb-2">Пароль</label>
            <input type="password" 
                   name="password" 
                   id="password" 
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        <div class="mb-6">
            <label for="confirm_password" class="block text-gray-700 mb-2">Подтверждение пароля</label>
            <input type="password" 
                   name="confirm_password" 
                   id="confirm_password" 
                   required
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
        </div>
        
        {% if error %}
        <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg">
            {{ error }}
        </div>
        {% endif %}
        
        <button type="submit" 
                class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">
            Зарегистрироваться
        </button>
    </form>
    
    <p class="text-center text-gray-600 mt-4">
        Уже есть аккаунт? 
        <a href="/auth/login" class="text-blue-600 hover:underline">Войти</a>
    </p>
</div>
{% endblock %}
