{% extends "base.html" %}

{% block title %}{{ project.name }}{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
<script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">{{ project.name }}</h1>
        <a href="/projects/" class="text-gray-600 hover:text-gray-800">← Назад к урокам</a>
    </div>

    <div id="project_edit_content">
        {% include "_project_edit_content.html" with context %}
    </div>
</div>

<script>
    document.getElementById('plan-file')?.addEventListener('change', function(e) {
        const fileName = e.target.files[0]?.name || 'Файл не выбран';
        document.getElementById('file-name').textContent = fileName;
    });

    // Добавление этапа
    document.getElementById('addStageBtn')?.addEventListener('click', async () => {
        const response = await fetch(`/projects/{{ project.id }}/handouts/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                name: 'Новый этап',
                description: 'Описание этапа'
            })
        });
        const html = await response.text();
        document.getElementById('stage-list-container').innerHTML = html;
    });

    document.addEventListener('all-handouts-generated', function() {
        document.getElementById('generateAllBtn').classList.add('hidden');
        document.getElementById('compileBtn').classList.remove('hidden');
    });

</script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const editorContainer = document.getElementById('editor-container');
        const hiddenInput = document.getElementById('compiled_content');

        if (editorContainer && window.toastui) {
            const editor = new toastui.Editor({
                el: editorContainer,
                initialEditType: 'wysiwyg',
                previewStyle: 'vertical',
                height: '600px',
                initialValue: hiddenInput.value || '',
                language: 'ru',
                toolbarItems: [
                    ['heading', 'bold', 'italic', 'strike'],
                    ['hr', 'quote'],
                    ['ul', 'ol', 'task', 'indent', 'outdent'],
                    ['table', 'image', 'link'],
                    ['code', 'codeblock']
                ],
                hideModeSwitch: true,
                useDefaultHTMLSanitizer: false,
                customHTMLRenderer: {}
            });
            window.editorInstance = editor;
        }
    });

    function saveEditorContent() {
        if (window.editorInstance) {
            const content = window.editorInstance.getMarkdown();
            document.getElementById('compiled_content').value = content;
            return true;
        }
        return false;
    }
</script>
{% endblock %}
