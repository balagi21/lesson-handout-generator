{% extends "base.html" %}

{% block title %}{{ project.name }}{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-md p-6">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-gray-800">{{ project.name }}</h1>
        <a href="/projects/" class="text-gray-600 hover:text-gray-800">← Назад к урокам</a>
    </div>

    <div id="project_edit_content">
        {% include "_project_edit_content.html" with context %}
    </div>
</div>

<script>
    document.getElementById('plan-file')?.addEventListener('change', function(e) {
        const fileName = e.target.files[0]?.name || 'Файл не выбран';
        document.getElementById('file-name').textContent = fileName;
    });

    // Добавление этапа
    document.getElementById('addStageBtn')?.addEventListener('click', async () => {
        const response = await fetch(`/projects/${projectId}/handouts/create`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({
                name: 'Новый этап',
                description: 'Описание этапа'
            })
        });
        const html = await response.text();
        document.getElementById('stage-list-container').innerHTML = html;
    });

    document.addEventListener('all-handouts-generated', function() {
        document.getElementById('generateAllBtn').classList.add('hidden');
        document.getElementById('compileBtn').classList.remove('hidden');
    });

</script>
{% endblock %}
