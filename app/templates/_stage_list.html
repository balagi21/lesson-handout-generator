{% if handouts %}
    <!-- Метаданные -->
    <div class="grid grid-cols-3 gap-4 mb-6">
        <div>
            <label class="block text-sm font-medium mb-1">Предмет</label>
            <input type="text" id="subject" value="{{ subject }}" class="w-full px-3 py-2 border rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Класс</label>
            <input type="text" id="grade" value="{{ grade }}" class="w-full px-3 py-2 border rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Тема урока</label>
            <input type="text" id="topic" value="{{ topic }}" class="w-full px-3 py-2 border rounded-lg">
        </div>
    </div>
    
    <!-- Список этапов -->
    <div id="stages-list" class="space-y-4 mb-6">
        {% for handout in handouts %}
            {% set is_first = loop.first %}
            {% set is_last = loop.last %}
            {% include "_stage.html" with context %}
        {% endfor %}
    </div>
{% else %}
    <div class="text-center py-8 text-gray-500">
        Нет этапов урока. Сгенерируйте план на шаге 1.
    </div>
{% endif %}
