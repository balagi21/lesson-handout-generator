<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Генератор раздаточных материалов{% endblock %}</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="/static/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false},
                    {left: '\\(', right: '\\)', display: false},
                    {left: '\\[', right: '\\]', display: true}
                ],
                throwOnError: false
            });
        });
        document.addEventListener('DOMContentLoaded', function() {
            document.body.addEventListener('htmx:afterSwap', function(evt) {
                if (window.renderMathInElement) {
                    try {
                        renderMathInElement(document.body, {
                            delimiters: [
                                {left: '$$', right: '$$', display: true},
                                {left: '$', right: '$', display: false},
                                {left: '\\(', right: '\\)', display: false},
                                {left: '\\[', right: '\\]', display: true}
                            ],
                            throwOnError: false
                        });
                    } catch(e) {
                        console.warn('KaTeX error:', e);
                    }
                }
            });
        });
    </script>
    <link rel="stylesheet" href="/static/css/markdown.css">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-blue-600">HandoutGen</a>
                </div>
                {% if request.session.user_id %}
                    <div class="flex items-center space-x-4">
                        <a href="/profile/" class="text-gray-600 hover:text-gray-800">👋 {{ request.session.username }}</a>
                        <a href="/projects/" class="text-gray-600 hover:text-gray-800">Мои уроки</a>
                        <a href="/auth/logout" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Выйти</a>
                    </div>
                {% else %}
                    <div class="flex items-center space-x-4">
                        <a href="/auth/login" class="text-gray-600 hover:text-gray-800">Вход</a>
                        <a href="/auth/register" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Регистрация</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
