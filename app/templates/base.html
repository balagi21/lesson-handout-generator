<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Генератор раздаточных материалов{% endblock %}</title>
    <link id="favicon" rel="icon" type="image/x-icon" href="static/images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-blue-600">HandoutGen</a>
                </div>
                {% if request.session.user_id %}
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-600">👋 {{ request.session.username }}</span>
                        <a href="/dashboard" class="text-gray-600 hover:text-gray-800">Дашборд</a>
                        <a href="/auth/logout" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Выйти</a>
                    </div>
                {% else %}
                    <div class="flex items-center space-x-4">
                        <a href="/auth/login" class="text-gray-600 hover:text-gray-800">Вход</a>
                        <a href="/auth/register" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Регистрация</a>
                    </div>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}
</body>
</html>
